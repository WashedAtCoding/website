{% extends "base.html" %}

{% block content %}

<h2>Your Dashboard</h2>

<h3>Welcome, {{ username }}!</h3>

<a href="/create">Create New Comment</a>
<br><br>

{% if comments %}
    {% for comment in comments %}
        <div>
            <h3>{{ comment['title'] }}</h3>
            <p>{{ comment['content'] }}</p>
            <a href="/edit/{{ comment['id'] }}">Edit</a>
            <a href="/delete/{{ comment['id'] }}">Delete</a>
        </div>
        <hr>
    {% endfor %}
{% else %}
    <p>No comments yet!</p>
{% endif %}

<br>

<a href="/logout"><button>Logout</button></a>

{% endblock %}
