{% extends "base.html" %}

{% block content %}
<h3>Select your consoles:</h3>
<form method="POST">
  <div class="option-grid">
    <label class="option-card"><input type="checkbox" name="platforms" value="Steam"> Steam</label>
    <label class="option-card"><input type="checkbox" name="platforms" value="Xbox"> Xbox</label>
    <label class="option-card"><input type="checkbox" name="platforms" value="Nintendo Switch"> Nintendo Switch</label>
    <label class="option-card"><input type="checkbox" name="platforms" value="Playstation"> Playstation</label>
    <label class="option-card"><input type="checkbox" name="platforms" value="Oculus Quest"> Oculus Quest</label>
  </div>
  <button type="submit">Confirm</button>
</form>
{% endblock %}
