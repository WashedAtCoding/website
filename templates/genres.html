{% extends "base.html" %}

{% block content %}
<h3>Select Your Favorite Genres:</h3>
<form method="POST">
  <div class="option-grid">
    <label class="option-card"><input type="checkbox" name="genres" value="Action"> Action</label>
    <label class="option-card"><input type="checkbox" name="genres" value="RPG"> RPG</label>
    <label class="option-card"><input type="checkbox" name="genres" value="Idle"> Idle</label>
    <label class="option-card"><input type="checkbox" name="genres" value="Shooter"> Shooter</label>
    <label class="option-card"><input type="checkbox" name="genres" value="Strategy"> Strategy</label>
    <label class="option-card"><input type="checkbox" name="genres" value="Party"> Party</label>
  </div>
  <button type="submit">Confirm</button>
</form>
{% endblock %}
