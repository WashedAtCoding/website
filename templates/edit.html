{% extends "base.html" %}

{% block content %}
<h2>Edit Comment</h2>

<form method="POST">
    <input name="title" value="{{ comment['title'] }}" placeholder="Title"><br>
    <textarea name="content" placeholder="Content">{{ comment['content'] }}</textarea><br>
    <button type="submit">Save</button>
</form>

<a href="{{ url_for('dashboard') }}">Back to Dashboard</a>

{% endblock %}
