{% extends "base.html" %}

{% block content %}
<h2>Edit Entry</h2>

<form method="POST">
    <input name="title" value="{{ entry['title'] }}" placeholder="Title"><br>
    <textarea name="content" placeholder="Content">{{ entry['content'] }}</textarea><br>
    <button type="submit">Save</button>
</form>

<a href="{{ url_for('dashboard') }}">Back to Dashboard</a>

{% endblock %}
