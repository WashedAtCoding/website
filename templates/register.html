{% extends "base.html" %}

{% block content %}
<h2>Register</h2>
<form method="POST">
  <input name="username" placeholder="Username"><br>
  <input name="password" type="password" placeholder="Password"><br>
  
  <h3>Select your consoles:</h3>
  <label><input type="checkbox" name="interests" value="Steam"> Steam</label><br>
  <label><input type="checkbox" name="interests" value="Xbox"> Xbox</label><br>
  <label><input type="checkbox" name="interests" valuen="Nintendo Switch"> Nintendo Switch</label><br>
  <label><input type="checkbox" name="interests" value="Playstation"> Playstation</label><br>
  <label><input type="checkbox" name="interests" value="Oculus Quest"> Oculus Quest</label><br>
  
  <button type="submit">Sign Up</button>
</form>
<a href="/">Back to login</a>
<p class="error">{{ error }}</p>
{% endblock %}
