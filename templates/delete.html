{% extends "base.html" %}

{% block content %}
<h2>Delete Entry</h2>

<p>Are you sure you want to delete "{{ entry['title'] }}"?</p>
<p>{{ entry['content'] }}</p>

<form method="POST">
    <button type="submit">Delete</button>
    <a href="{{ url_for('dashboard') }}">Cancel</a>
</form>

{% endblock %}
